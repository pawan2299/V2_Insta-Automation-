services:
  - type: web
    name: krishna-bot
    env: python
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /
    buildCommand: pip install -r requirements.txt
    # ✅ FIX: Removed "--preload" at the end
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
